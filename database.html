<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLE MOD — Database</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    /* Global Styles */
    :root {
      --primary-red: #DA020E;
      --dark-red: #B8001A;
      --light-red: #FF1E2E;
      --gold: #FFD700;
      --dark-bg: #1a1a1a;
      --darker-bg: #0f0f0f;
      --text-light: #f5f5f5;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--dark-bg);
      color: var(--text-light);
      font-family: 'Rajdhani', sans-serif;
      overflow-x: hidden;
    }

    /* Navigation */
    .navbar {
      background: rgba(26, 26, 26, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--primary-red);
      transition: all 0.3s ease;
    }

    .navbar-brand img {
      height: 50px;
      transition: transform 0.3s ease;
    }

    .navbar-brand:hover img {
      transform: scale(1.05);
    }

    .nav-link {
      color: var(--text-light) !important;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      position: relative;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--primary-red) !important;
    }

    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 50%;
      width: 0;
      height: 2px;
      background: var(--primary-red);
      transition: all 0.3s ease;
      transform: translateX(-50%);
    }

    .nav-link:hover::after,
    .nav-link.active::after {
      width: 100%;
    }

    .social-icons a {
      color: var(--text-light);
      font-size: 1.2rem;
      margin: 0 10px;
      transition: all 0.3s ease;
    }

    .social-icons a:hover {
      color: var(--primary-red);
      transform: translateY(-2px);
    }

    .login-button {
      background: linear-gradient(45deg, var(--primary-red), var(--dark-red));
      color: white !important;
      padding: 8px 20px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .login-button:hover {
      background: transparent;
      border-color: var(--primary-red);
      color: var(--primary-red) !important;
      transform: translateY(-2px);
    }

    /* Hero Section */
    .hero-section {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .hero-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-section::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(218, 2, 14, 0.3);
    }

    .hero-section .caption {
      position: absolute;
      top: 50%;
      left: 10%;
      transform: translateY(-50%);
      z-index: 10;
      max-width: 500px;
    }

    .hero-section .caption h2 {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    }

    .hero-section .caption p {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      color: var(--text-light);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
    }

    /* Section Styles */
    .section-title {
      font-weight: 700;
      font-size: 3rem;
      margin-bottom: 2rem;
      color: var(--primary-red);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .section-dark {
      background: var(--darker-bg);
    }

    .section-light {
      background: var(--dark-bg);
    }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      margin-top: -100px;
    }

    .countdown .time {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-number {
      font-size: 4rem;
      font-weight: 700;
      color: var(--primary-red);
      padding: 20px 30px;
      border-radius: 15px;
      background: linear-gradient(135deg, rgba(218, 2, 14, 0.1), rgba(184, 0, 26, 0.1));
      border: 2px solid var(--primary-red);
      position: relative;
      overflow: hidden;
      user-select: none;
      text-shadow: 0 0 10px rgba(218, 2, 14, 0.5);
    }

    .countdown-number::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      animation: shimmer 2s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .countdown .time small {
      margin-top: 10px;
      font-size: 1.2rem;
      color: var(--text-light);
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Features */
    .features-section .col-md-4 {
      margin-bottom: 2rem;
    }

    .features-section i {
      color: var(--primary-red);
      margin-bottom: 1rem;
    }

    .features-section h4 {
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 1rem;
    }

    /* Stats */
    .stats-section {
      background: linear-gradient(135deg, var(--primary-red), var(--dark-red));
    }

    .stats-section h2 {
      color: white;
      font-size: 4rem;
      font-weight: 700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }

    .stats-section p {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.3rem;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(45deg, var(--primary-red), var(--dark-red));
      border: none;
      padding: 12px 30px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      border-radius: 25px;
    }

    .btn-primary:hover {
      background: linear-gradient(45deg, var(--dark-red), var(--primary-red));
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(218, 2, 14, 0.4);
    }

    /* FAQ */
    .accordion-item {
      background: var(--darker-bg);
      border: 1px solid var(--primary-red);
      border-radius: 10px !important;
      margin-bottom: 15px;
      overflow: hidden;
    }

    .accordion-button {
      background: var(--darker-bg);
      color: var(--text-light);
      font-weight: 600;
      border: none;
      padding: 1.5rem;
    }

    .accordion-button:not(.collapsed) {
      background: var(--primary-red);
      color: white;
    }

    .accordion-button:focus {
      box-shadow: none;
      border: none;
    }

    .accordion-body {
      background: var(--darker-bg);
      color: var(--text-light);
      border-top: 1px solid var(--primary-red);
    }

    /* Contact Form */
    .form-control {
      background: var(--darker-bg);
      border: 2px solid var(--primary-red);
      color: var(--text-light);
      border-radius: 10px;
    }

    .form-control:focus {
      background: var(--darker-bg);
      border-color: var(--light-red);
      color: var(--text-light);
      box-shadow: 0 0 10px rgba(218, 2, 14, 0.3);
    }

    .form-label {
      color: var(--text-light);
      font-weight: 600;
    }

    /* Footer */
    footer {
      background: var(--darker-bg);
      border-top: 2px solid var(--primary-red);
    }

    footer a {
      color: var(--primary-red);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    footer a:hover {
      color: var(--light-red);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .hero-section .caption h2 {
        font-size: 2.5rem;
      }
      
      .section-title {
        font-size: 2rem;
      }
      
      .countdown-number {
        font-size: 2.5rem;
        padding: 15px 20px;
      }
    }

    /* Modal */
    .modal-content {
      background: var(--darker-bg);
      border: 2px solid var(--primary-red);
    }

    .modal-header {
      border-bottom: 1px solid var(--primary-red);
    }

    .modal-title {
      color: var(--primary-red);
    }

    .btn-close {
      filter: invert(1);
    }
  </style>

  <style>
    .page-shell {
      min-height: calc(100vh - 200px);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 20px 60px;
    }
    .page-shell .inner { max-width: 640px; }
    .page-shell .badge-soon {
      display: inline-block;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid var(--primary-red);
      border-radius: 25px;
      padding: 6px 18px;
      margin-bottom: 1.5rem;
    }
    .page-shell h1 {
      font-size: 3.5rem;
      font-weight: 700;
      color: var(--primary-red);
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      margin-bottom: 1rem;
    }
    .page-shell p {
      font-size: 1.2rem;
      color: var(--text-light);
      margin-bottom: 2rem;
    }
    @media (max-width: 768px) {
      .page-shell h1 { font-size: 2.2rem; }
    }
  </style>
</head>
